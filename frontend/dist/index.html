<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payslip App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #5468ff;
      --blue-dk: #3a50e0;
      --blue-lt: #e8eaff;
      --bg:      #f4f6fb;
      --white:   #ffffff;
      --border:  #d8dce8;
      --text:    #1a1d2e;
      --muted:   #6b7280;
      --ok-bg:   #e8fff0;
      --ok-fg:   #1a7f4b;
      --err-bg:  #fff0f0;
      --err-fg:  #b91c1c;
      --radius:  50px;
      --card-r:  14px;
    }

    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

    /* ── Header ──────────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center;
      padding: 16px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      width: 56px; height: 56px; background: var(--blue); color: #fff;
      font-weight: 800; font-size: 1rem; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-right: 20px; flex-shrink: 0;
    }
    .header-titles h1 { font-size: 1.35rem; font-weight: 800; line-height: 1.2; }
    .header-titles p  { font-size: 0.8rem;  color: var(--blue); font-weight: 700; letter-spacing: 1.2px; }
    .logout-btn {
      margin-left: auto; background: none; border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 7px 20px; cursor: pointer;
      font-size: 0.88rem; color: var(--muted); transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--white); border-radius: var(--card-r);
      box-shadow: 0 4px 24px rgba(84,104,255,.08);
      padding: 40px 44px; max-width: 540px; margin: 60px auto;
    }

    /* ── Form ────────────────────────────────────────────── */
    .field { margin-bottom: 22px; }
    .field label { display: block; font-weight: 700; margin-bottom: 8px; font-size: .95rem; }
    .field input,
    .field select {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 1rem; outline: none; transition: border .2s;
      background: var(--white); color: var(--text);
    }
    .field input:focus,
    .field select:focus { border-color: var(--blue); }
    .field input:disabled { background: #f7f8ff; color: var(--muted); }

    /* OTP boxes */
    .otp-row { display: flex; gap: 10px; }
    .otp-box {
      width: 50px; height: 54px; text-align: center;
      font-size: 1.4rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 9px; outline: none;
    }
    .otp-box:focus { border-color: var(--blue); }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 30px; border: none; border-radius: var(--radius);
      font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary   { background: var(--blue);    color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dk); }
    .btn-secondary { background: var(--blue-lt); color: var(--blue); }
    .btn-secondary:hover:not(:disabled) { background: #d0d5ff; }
    .btn-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .btn-center { text-align: center; margin-top: 8px; }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs { display: flex; gap: 10px; margin-bottom: 28px; }
    .tab {
      padding: 10px 26px; border-radius: var(--radius); border: none;
      font-size: .93rem; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .tab.active   { background: var(--blue);    color: #fff; }
    .tab.inactive { background: var(--blue-lt); color: var(--blue); }
    .tab.inactive:hover { background: #d0d5ff; }

    /* ── Dashboard shell ─────────────────────────────────── */
    .dashboard { max-width: 860px; margin: 40px auto; padding: 0 20px; }
    .welcome { font-size: 1.25rem; font-weight: 800; margin-bottom: 26px; }
    .panel { background: var(--white); border-radius: var(--card-r);
             box-shadow: 0 4px 24px rgba(84,104,255,.07); padding: 36px 40px; }

    /* ── File drop ───────────────────────────────────────── */
    .file-drop {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 28px; text-align: center; color: var(--muted);
      cursor: pointer; transition: all .2s; margin-bottom: 20px; display: block;
    }
    .file-drop:hover { border-color: var(--blue); color: var(--blue); }
    .file-drop input[type="file"] { display: none; }
    .file-name { color: var(--blue); font-weight: 600; }

    /* ── Table ───────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; margin-top: 18px; }
    table.csv { width: 100%; border-collapse: collapse; font-size: .86rem; }
    table.csv th {
      background: var(--blue); color: #fff;
      padding: 10px 12px; text-align: left; white-space: nowrap;
    }
    table.csv td { padding: 9px 12px; border-bottom: 1px solid #eef0f8; }
    table.csv tr:nth-child(even) td { background: #f7f8ff; }

    /* ── Messages ────────────────────────────────────────── */
    .msg-ok  { background: var(--ok-bg);  color: var(--ok-fg);  border-radius: 8px; padding: 12px 18px; margin: 14px 0; }
    .msg-err { background: var(--err-bg); color: var(--err-fg); border-radius: 8px; padding: 12px 18px; margin: 14px 0; }
    .preview-count { color: var(--muted); font-size: .88rem; margin-top: 14px; }

    /* ── PDF iframe ──────────────────────────────────────── */
    .pdf-frame { width: 100%; height: 540px; border: 1.5px solid var(--border); border-radius: 10px; margin-top: 18px; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Not-found ───────────────────────────────────────── */
    .not-found { text-align: center; margin-top: 80px; color: var(--muted); font-size: 1.1rem; }
  </style>

<body>
<script type="module">
import init, * as bindings from '/frontend.js';
const wasm = await init({ module_or_path: '/frontend_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script><script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
